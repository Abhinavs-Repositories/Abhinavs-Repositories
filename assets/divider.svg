<svg width="900" height="6" viewBox="0 0 900 6" fill="none" xmlns="http://www.w3.org/2000/svg" role="presentation">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#334155"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0f2fe" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#e0f2fe" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-220 0; 900 0" dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect y="2" width="900" height="2" rx="1" fill="url(#base)"/>
  <rect y="2" width="900" height="2" rx="1" fill="url(#sweep)"/>
</svg>
