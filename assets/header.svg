<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abhinav Singh — AI Engineer, Production Agentic Systems">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1222"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="name" x1="250" y1="0" x2="650" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#7dd3fc"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-360 0; 360 0; -360 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1e293b"/>
    </pattern>
    <style>
      .rise{opacity:0; animation:rise .9s cubic-bezier(.2,.7,.2,1) forwards;}
      .d1{animation-delay:.10s} .d2{animation-delay:.28s} .d3{animation-delay:.48s}
      .d4{animation-delay:.66s} .d5{animation-delay:.76s} .d6{animation-delay:.86s} .d7{animation-delay:.96s}
      @keyframes rise{from{opacity:0; transform:translateY(16px)} to{opacity:1; transform:translateY(0)}}
      .uline{transform:scaleX(0); transform-box:fill-box; transform-origin:center; animation:grow 1s .5s cubic-bezier(.2,.7,.2,1) forwards;}
      @keyframes grow{to{transform:scaleX(1)}}
      .dot{animation:drift 6s ease-in-out infinite;}
      .dot.b{animation-duration:8s; animation-delay:1s}
      .dot.c{animation-duration:7s; animation-delay:.4s}
      @keyframes drift{0%,100%{transform:translateY(0); opacity:.3} 50%{transform:translateY(-10px); opacity:.95}}
      text{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
      .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;}
    </style>
  </defs>

  <rect width="900" height="280" rx="18" fill="url(#bg)"/>
  <rect width="900" height="280" rx="18" fill="url(#dots)" opacity="0.55"/>
  <ellipse cx="450" cy="118" rx="430" ry="150" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="899" height="279" rx="18" fill="none" stroke="#1f2937" stroke-width="1"/>

  <circle class="dot"   cx="118" cy="78"  r="3"   fill="#38bdf8"/>
  <circle class="dot b" cx="782" cy="66"  r="2.5" fill="#818cf8"/>
  <circle class="dot c" cx="824" cy="182" r="3"   fill="#38bdf8"/>
  <circle class="dot"   cx="86"  cy="196" r="2.5" fill="#818cf8"/>

  <text class="mono rise d1" x="450" y="66" text-anchor="middle" fill="#64748b" font-size="13" letter-spacing="7">A I&#160;&#160;E N G I N E E R</text>

  <text class="rise d2" x="450" y="142" text-anchor="middle" fill="url(#name)" font-size="62" font-weight="700" letter-spacing="3">ABHINAV SINGH</text>

  <rect class="uline" x="360" y="160" width="180" height="3" rx="2" fill="url(#accent)"/>

  <text class="rise d3" x="450" y="196" text-anchor="middle" fill="#94a3b8" font-size="16" letter-spacing="0.5">Production Agentic Systems&#160;&#160;·&#160;&#160;RAG at Scale&#160;&#160;·&#160;&#160;BFSI</text>

  <g class="mono" font-size="12" fill="#cbd5e1">
    <g class="rise d4">
      <rect x="205" y="222" width="118" height="30" rx="15" fill="#0f172a" stroke="#1e293b"/>
      <circle cx="221" cy="237" r="3" fill="#38bdf8"/>
      <text x="276" y="237" text-anchor="middle" dominant-baseline="central">150K+ users</text>
    </g>
    <g class="rise d5">
      <rect x="329" y="222" width="118" height="30" rx="15" fill="#0f172a" stroke="#1e293b"/>
      <circle cx="345" cy="237" r="3" fill="#818cf8"/>
      <text x="400" y="237" text-anchor="middle" dominant-baseline="central">5K+ advisors</text>
    </g>
    <g class="rise d6">
      <rect x="453" y="222" width="118" height="30" rx="15" fill="#0f172a" stroke="#1e293b"/>
      <circle cx="469" cy="237" r="3" fill="#f5a800"/>
      <text x="524" y="237" text-anchor="middle" dominant-baseline="central">16 SDK issues</text>
    </g>
    <g class="rise d7">
      <rect x="577" y="222" width="118" height="30" rx="15" fill="#0f172a" stroke="#1e293b"/>
      <circle cx="593" cy="237" r="3" fill="#22c55e"/>
      <text x="648" y="237" text-anchor="middle" dominant-baseline="central">Live in prod</text>
    </g>
  </g>
</svg>
