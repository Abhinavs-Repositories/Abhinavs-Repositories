# Premium "metrics" SVG (lowlighter/metrics) — isometric calendar + language/habit breakdown.
# SETUP (one-time):
#   1. Create a classic Personal Access Token (no scopes needed for public data; add `repo` if you
#      want private-repo stats) at https://github.com/settings/tokens
#   2. Add it to this repo as a secret named  METRICS_TOKEN
#      (Settings -> Secrets and variables -> Actions -> New repository secret)
#   3. Run the workflow once (Actions tab -> Metrics -> Run workflow). It commits assets/metrics.svg.
#   4. Drop this into README.md where you want it:
#        <img src="./assets/metrics.svg" width="100%" alt="metrics"/>
name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]   # daily refresh
  workflow_dispatch:
  push: { branches: [main] }
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Abhinavs-Repositories
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          # match the README palette
          config_animations: yes
          # language breakdown
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          # isometric contribution calendar (the premium centerpiece)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # coding habits
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
