# Contribution-grid snake, palette-matched to the README (sky -> indigo).
# Zero setup beyond enabling Actions. It pushes the generated SVG to an `output` branch.
# After the first successful run, add this to README.md:
#   <img src="https://raw.githubusercontent.com/Abhinavs-Repositories/Abhinavs-Repositories/output/snake-dark.svg" width="100%" alt="snake"/>
name: Generate Snake
on:
  schedule: [{ cron: "0 */12 * * *" }]   # twice daily
  workflow_dispatch:
  push: { branches: [main] }
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build snake SVG
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: Abhinavs-Repositories
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#38bdf8&color_dots=#0d1117,#1e293b,#334155,#7dd3fc,#818cf8
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
